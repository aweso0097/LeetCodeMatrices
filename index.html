<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCodeMetrices</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>LeetCodeMetrices</h1>

        <div class="user-container">
            <p>Enter Your Username</p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter your username here" id="user-input">
                <button id="btn1">Search</button>
            </div>
        </div>
        <div class="stats-container">
            <div class="progress">
                <div class="easy-progress circle">
                    <span id="easy-progress">Easy</span>
                </div>
                <div class="medium-progress circle">
                    <span id="medium-progress">Medium</span>
                </div>
                <div class="hard-progress circle">
                    <span id="hard-progress">Hard</span>
                </div>
            </div>
            <div class="stats-card">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
